<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <div style="max-width: 400px; width: 100%; border: 1px solid #e4e4e7; border-radius: 16px; padding: 32px; text-align: left; background-color: #ffffff;">
                    <h2 style="color: #18181b; margin: 0 0 12px 0; font-size: 24px; font-weight: bold;">Hello!</h2>
                    <p style="color: #71717a; font-size: 16px; line-height: 1.5; margin: 0 0 24px 0;">
                        We received a request to reset your account password. Click the button below to proceed.
                    </p>
                    
                    <div style="text-align: center; margin-bottom: 24px;">
                        <a href="{{.ResetURL}}" style="display: inline-block; background-color: #09090b; color: #ffffff; padding: 16px 24px; border-radius: 12px; text-decoration: none; font-size: 16px; font-weight: bold; width: 85%;">
                            Reset Password
                        </a>
                    </div>
                    
                    <p style="font-size: 13px; color: #a1a1aa; line-height: 1.4; margin: 0;">
                        This link is valid for <strong>15 minutes</strong>. If you didn't request this change, you can ignore this email and your password will remain unchanged.
                    </p>
                    
                    <hr style="border: 0; border-top: 1px solid #f4f4f5; margin: 32px 0;">
                    
                    <p style="font-size: 12px; color: #d4d4d8; text-align: center; margin: 0;">
                        Secure Authentication System
                    </p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
