services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaming123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  app:
    build: .
    restart: always
    container_name: kaming-api-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      
volumes:
  postgres_data: